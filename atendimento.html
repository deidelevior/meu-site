<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atendimento</title>
</head>
<body>

<h1>Atendimento</h1>

<form>

<p>Nome completo:</p>
<input type="text">

<p>E-mail:</p>
<input type="email">

<p>Telefone:</p>
<input type="tel">

<p>Tipo de atendimento:</p>
<select>
<option>Dúvida</option>
<option>Reclamação</option>
<option>Sugestão</option>
</select>

<p>Prioridade:</p>
<input type="radio" name="prioridade"> Baixa
<input type="radio" name="prioridade"> Média
<input type="radio" name="prioridade"> Alta

<p>Descrição:</p>
<textarea></textarea>

<p>Anexo:</p>
<input type="file">

<p>
<input type="checkbox"> Autorizo contato
</p>

<button type="submit">Enviar</button>

</form>

</body>
</html>
