<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<title>Inscrições</title>
</head>
<body>

<h1>Inscrição em Cursos</h1>

<form>

<h3>Dados pessoais</h3>
<input type="text" placeholder="Nome completo">
<input type="text" placeholder="CPF">
<input type="date">

<h3>Endereço</h3>
<input type="text" placeholder="Rua">
<input type="text" placeholder="Número">
<input type="text" placeholder="Cidade">
<input type="text" placeholder="Estado">

<p>Curso desejado:</p>
<select>
<option>Informática</option>
<option>Administração</option>
<option>Agropecuária</option>
<option>Edificações</option>
</select>

<p>Turno:</p>
<input type="radio" name="turno"> Manhã
<input type="radio" name="turno"> Tarde
<input type="radio" name="turno"> Noite

<p>Experiência:</p>
<input type="radio" name="exp"> Sim
<input type="radio" name="exp"> Não

<p>Áreas de interesse:</p>
<input type="checkbox"> Programação
<input type="checkbox"> Redes
<input type="checkbox"> Banco de Dados

<p>Documento:</p>
<input type="file">

<p>Observações:</p>
<textarea></textarea>

<button type="submit">Enviar</button>

</form>

</body>
</html>
