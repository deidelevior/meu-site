<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Robótica</title>
</head>
<body>

<h1>Inscrição Robótica</h1>

<form>

<p>Nome completo:</p>
<input type="text">

<p>E-mail institucional:</p>
<input type="email">

<p>Curso:</p>
<input type="text">

<p>Série/Ano:</p>
<input type="text">

<p>Modalidade:</p>
<input type="radio" name="modalidade"> Olimpíada
<input type="radio" name="modalidade"> Projeto

<p>Nome da equipe:</p>
<input type="text">

<p>Quantidade de integrantes:</p>
<input type="number" max="10">

<p>Integrantes:</p>
<textarea></textarea>

<p>Equipamentos especiais?</p>
<input type="text">

<p>Upload do projeto:</p>
<input type="file">

<p>
<input type="checkbox"> Aceito o regulamento
</p>

<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</form>

</body>
</html>
